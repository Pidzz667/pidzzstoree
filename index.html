<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pidz Bot - Order Produk Dengan Bot</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #070b19;
            overflow: hidden;
        }
        
        /* Ultra-modern glowing Telegram background pattern */
        .telegram-bg {
            background-color: #0d1222;
            background-image: 
                radial-gradient(at 0% 0%, rgba(30, 41, 59, 0.5) 0, transparent 50%), 
                radial-gradient(at 50% 0%, rgba(14, 116, 144, 0.15) 0, transparent 50%),
                radial-gradient(at 100% 100%, rgba(15, 23, 42, 0.8) 0, transparent 50%),
                radial-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 0);
            background-size: 100% 100%, 100% 100%, 100% 100%, 20px 20px;
        }

        /* Elegant Thin Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 5px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(13, 18, 34, 0.5);
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(56, 189, 248, 0.2);
            border-radius: 99px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(56, 189, 248, 0.4);
        }

        /* Spring bounce physics animations for modern chat feel */
        @keyframes springIn {
            0% {
                opacity: 0;
                transform: scale(0.9) translateY(40px);
                filter: blur(4px);
            }
            60% {
                transform: scale(1.03) translateY(-4px);
                filter: none;
            }
            85% {
                transform: scale(0.98) translateY(1px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        .chat-bubble-anim {
            animation: springIn 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes shrinkOut {
            0% { 
                opacity: 1; 
                transform: scale(1) translateY(0);
                filter: none;
            }
            100% { 
                opacity: 0; 
                transform: scale(0.85) translateY(-30px);
                filter: blur(4px);
                max-height: 0px;
                margin-bottom: 0px;
                padding-top: 0px;
                padding-bottom: 0px;
            }
        }
        .fade-out-anim {
            animation: shrinkOut 0.45s cubic-bezier(0.3, 0.05, 0.1, 1) forwards;
            pointer-events: none;
        }

        /* Pulse animation for the start invitation card */
        @keyframes floatPulse {
            0%, 100% {
                transform: translateY(0) scale(1);
                filter: drop-shadow(0 15px 20px rgba(56, 189, 248, 0.15));
            }
            50% {
                transform: translateY(-10px) scale(1.02);
                filter: drop-shadow(0 25px 35px rgba(56, 189, 248, 0.3));
            }
        }
        .floating-invite {
            animation: floatPulse 3s ease-in-out infinite;
        }

        /* Shimmering glassmorphism effect */
        .glass-card {
            background: rgba(24, 37, 51, 0.55);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.07);
        }

        /* Dynamic bubble styling */
        .bubble-bot {
            border-radius: 20px 20px 20px 6px;
        }
        .bubble-user {
            border-radius: 20px 20px 6px 20px;
            background: linear-gradient(135deg, #1e40af 0%, #1d4ed8 100%);
            box-shadow: 0 8px 24px rgba(29, 78, 216, 0.35);
        }

        /* Soft glow for active payment items */
        .glow-active {
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.15);
        }
    </style>
</head>
<body class="h-screen w-screen flex items-center justify-center p-0 text-slate-100">

    <!-- Main Telegram Workspace (Adaptive full-screen dashboard) -->
    <div class="w-full h-full bg-[#0d1222] flex flex-col overflow-hidden relative">
        
        <!-- Premium Header Bar -->
        <header class="glass-card px-6 py-4 flex items-center justify-between border-b border-white/5 z-20 shadow-xl">
            <div class="flex items-center space-x-4">
                <button onclick="restartBot()" class="text-sky-400 hover:text-white transition-all duration-300 p-2.5 hover:bg-white/5 rounded-2xl" title="Mulai Ulang Bot">
                    <i class="fa-solid fa-house-chimney text-lg"></i>
                </button>
                <div class="relative group cursor-pointer animate-none" onclick="restartBot()">
                    <img src="https://cdn.phototourl.com/free/2026-07-02-973c87d1-fd4c-4972-8b4b-c374e64f1432.jpg" 
                         alt="Pidz Bot Logo" 
                         class="w-12 h-12 rounded-2xl object-cover border-2 border-sky-500/30 group-hover:border-sky-400 transition-all duration-300"
                         onerror="this.src='https://placehold.co/150x150/182533/38bdf8?text=PB'">
                    <span class="absolute -bottom-1 -right-1 w-4 h-4 bg-emerald-500 border-3 border-[#0d1222] rounded-full animate-ping"></span>
                    <span class="absolute -bottom-1 -right-1 w-4 h-4 bg-emerald-500 border-3 border-[#0d1222] rounded-full"></span>
                </div>
                <div>
                    <h1 class="font-extrabold text-base tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-slate-100 via-slate-200 to-sky-400">Pidz Bot Order</h1>
                    <div class="flex items-center space-x-1.5 mt-0.5">
                        <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
                        <p class="text-[11px] text-sky-400 font-bold uppercase tracking-wider">online & active</p>
                    </div>
                </div>
            </div>
            
            <!-- Quick Action Options -->
            <div class="flex items-center space-x-3">
                <button onclick="restartBot()" class="text-slate-400 hover:text-rose-400 p-2.5 rounded-xl hover:bg-rose-500/10 transition-all duration-300" title="Bersihkan Chat">

            </div>
        </header>

        <!-- Toast Notification Banner -->
        <div id="notifBanner" class="hidden fixed top-24 left-1/2 -translate-x-1/2 bg-sky-500 text-white text-xs font-bold px-6 py-3 rounded-full shadow-2xl shadow-sky-950/40 z-50 flex items-center gap-2.5 pointer-events-none transition-all duration-500 transform -translate-y-8 opacity-0">
            <i class="fa-solid fa-circle-check text-sm animate-bounce"></i>
            <span id="notifMessage">Pesan disalin!</span>
        </div>

        <!-- Scrollable Chat Workspace -->
        <main id="chatArea" class="flex-1 telegram-bg px-4 py-6 md:px-8 overflow-y-auto custom-scrollbar space-y-6 relative flex flex-col">
            
            <!-- Outer-space floating welcome invitation (Pre-/start state) -->
            <div id="chatPlaceholder" class="m-auto max-w-sm w-full floating-invite flex flex-col items-center justify-center text-center px-4 py-8 z-10">
                <div class="w-24 h-24 rounded-[2rem] bg-gradient-to-tr from-sky-500 to-blue-600 flex items-center justify-center shadow-2xl shadow-sky-500/20 mb-6 relative">
                    <i class="fa-brands fa-telegram text-5xl text-white transform -rotate-12"></i>
                    <span class="absolute -top-1 -right-1 flex h-6 w-6">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-sky-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-6 w-6 bg-sky-500 items-center justify-center text-[10px] font-black text-white">1</span>
                    </span>
                </div>
                <h2 class="text-xl font-extrabold text-slate-100 mb-2 tracking-tight">Selamat Datang di Pidz Store!</h2>
                <p class="text-xs text-slate-400 leading-relaxed mb-6 font-medium">
                    Mulai petualangan belanjamu sekarang. Tap tombol di bawah untuk membuka menu interaktif bot otomatis kami.
                </p>
                
                <!-- Large Interactive Click Invitation -->
                <button onclick="sendStartCommand()" class="w-full bg-gradient-to-r from-sky-500 to-blue-500 hover:from-sky-400 hover:to-blue-400 text-white font-extrabold text-xs py-4 px-6 rounded-2xl shadow-lg shadow-sky-500/20 transition-all duration-300 transform hover:-translate-y-1 active:translate-y-0 flex items-center justify-center gap-3">
                    <i class="fa-solid fa-circle-play text-sm"></i> JALANKAN BOT SEKARANG

            <div id="chatAnchor"></div>
        </main>

        <!-- Message Input Bar / Footer Workspace -->
        <footer class="glass-card p-4 border-t border-white/5 flex items-center space-x-3 z-10">
            <button onclick="sendStartCommand()" class="text-sky-400 hover:text-white px-5 py-3.5 bg-sky-950/40 hover:bg-sky-500 border border-sky-500/30 rounded-2xl text-xs font-black tracking-widest uppercase transition-all duration-300 hover:shadow-lg hover:shadow-sky-500/20 active:scale-95 flex items-center gap-2" title="Mulai Bot">
                <i class="fa-solid fa-bolt text-[11px] animate-pulse"></i> /start
            </button>
            <div class="flex-1 relative">
                <input type="text" id="userInput" placeholder="Tanya AI Pidz atau pesan langsung di sini..." 
                       class="w-full bg-[#111726]/80 text-slate-100 placeholder-slate-500 text-sm rounded-2xl pl-5 pr-14 py-3.5 focus:outline-none focus:ring-2 focus:ring-sky-500/50 transition-all border border-white/5"
                       onkeydown="if(event.key === 'Enter') handleSendText()">
                <button onclick="handleSendText()" class="absolute right-3 top-1/2 -translate-y-1/2 text-sky-400 hover:text-sky-300 p-2 rounded-xl transition-all hover:bg-sky-500/10 active:scale-90" title="Kirim Pesan">
                    <i class="fa-solid fa-paper-plane text-base"></i>
                </button>
            </div>
        </footer>

    </div>

    <!-- Script Application Logic -->
    <script>
        // API Key is handled dynamically at runtime
        const apiKey = ""; 

        const chatArea = document.getElementById('chatArea');
        const userInput = document.getElementById('userInput');
        const chatPlaceholder = document.getElementById('chatPlaceholder');

        // Dynamic inline menu array tracker to manage previous selection wipes
        let activeInteractiveElements = [];

        // Smooth animations to clear older menus and guide emphasis to the current one
        function clearPreviousMenus() {
            activeInteractiveElements.forEach(el => {
                if (el && el.parentNode) {
                    el.classList.add('fade-out-anim');
                    setTimeout(() => {
                        el.remove();
                    }, 450);
                }
            });
            activeInteractiveElements = [];
        }

        // Reset conversation
        function restartBot() {
            chatArea.innerHTML = '<div id="chatAnchor"></div>';
            chatPlaceholder.classList.remove('hidden');
            scrollToBottom();
        }

        // Automatic smooth scroller
        function scrollToBottom() {
            chatArea.scrollTo({
                top: chatArea.scrollHeight,
                behavior: 'smooth'
            });
        }

        // Generates user dynamic chat balloon
        function appendUserMessage(text) {
            chatPlaceholder.classList.add('hidden');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'flex justify-end mb-4 chat-bubble-anim';
            msgDiv.innerHTML = `
                <div class="max-w-[75%] bubble-user text-white px-5 py-3.5 text-sm shadow-xl leading-relaxed break-words relative border border-white/10">
                    <p class="whitespace-pre-line font-medium">${text}</p>
                    <div class="flex items-center justify-end gap-1 mt-1.5 opacity-70">
                        <span class="text-[9px] font-bold">${getCurrentTimeStr()}</span>
                        <i class="fa-solid fa-check-double text-[9px]"></i>
                    </div>
                </div>
            `;
            chatArea.insertBefore(msgDiv, document.getElementById('chatAnchor'));
            scrollToBottom();
        }

        function getCurrentTimeStr() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            return `${hours}:${minutes}`;
        }

        // Generates bot response balloon wrap
        function createBotMessageContainer() {
            chatPlaceholder.classList.add('hidden');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'flex items-start gap-3 mb-5 chat-bubble-anim';
            
            const avatar = document.createElement('div');
            avatar.className = 'w-10 h-10 rounded-2xl object-cover flex-shrink-0 border border-white/5 overflow-hidden bg-slate-800 shadow-md';
            avatar.innerHTML = `<img src="https://cdn.phototourl.com/free/2026-07-02-973c87d1-fd4c-4972-8b4b-c374e64f1432.jpg" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/100x100/182533/38bdf8?text=PB'">`;
            
            const contentContainer = document.createElement('div');
            contentContainer.className = 'max-w-[85%] md:max-w-[70%] flex flex-col gap-2';

            msgDiv.appendChild(avatar);
            msgDiv.appendChild(contentContainer);
            chatArea.insertBefore(msgDiv, document.getElementById('chatAnchor'));
            
            return { container: msgDiv, content: contentContainer };
        }

        // Action Command: /start
        function sendStartCommand() {
            clearPreviousMenus();
            
            if (chatPlaceholder.classList.contains('hidden')) {
                appendUserMessage("/start");
            } else {
                chatPlaceholder.classList.add('hidden');
            }
            
            const botMsg = createBotMessageContainer();
            showTypingIndicator(botMsg.content);

            setTimeout(() => {
                removeTypingIndicator(botMsg.content);
                
                // Exquisite Welcome Dashboard card
                botMsg.content.innerHTML = `
                    <div class="glass-card text-slate-100 rounded-[22px] rounded-tl-sm shadow-2xl overflow-hidden border border-white/10">
                        <img src="https://cdn.phototourl.com/free/2026-07-02-973c87d1-fd4c-4972-8b4b-c374e64f1432.jpg" 
                             alt="Welcome Thumbnail" 
                             class="w-full h-48 md:h-56 object-cover border-b border-white/5"
                             onerror="this.src='https://placehold.co/500x250/111726/38bdf8?text=Pidz+Bot+Store'">
                        <div class="p-5 space-y-3">
                            <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-[10px] font-black tracking-wider uppercase bg-sky-500/10 text-sky-400 border border-sky-500/20">
                                <i class="fa-solid fa-gift"></i> Official Bot
                            </span>
                            <h4 class="font-extrabold text-lg md:text-xl text-sky-400 tracking-tight">Selamat Datang di Pidz Store! 🎉</h4>
                            <p class="text-xs text-slate-300 leading-relaxed font-medium">
                                Halo kak! Di sini kamu bisa memesan berbagai macam produk digital premium terlengkap secara instan seperti <b>Sewa Bot WA</b>, <b>Panel Pterodactyl Legal</b>, dan <b>File Eksklusif Pidz</b>.
                            </p>
                            <p class="text-[11px] text-slate-400 leading-relaxed font-medium">
                                Silakan tekan pilihan menu interaktif di bawah untuk melihat harga terbaik, atau kirimkan pertanyaan langsung untuk dibahas bersama asisten AI kami.
                            </p>
                        </div>
                    </div>
                `;

                // Interactive Action Menus below
                const menuDiv = document.createElement('div');
                menuDiv.className = 'flex flex-col sm:flex-row gap-2.5 w-full mt-2';
                menuDiv.innerHTML = `
                    <button onclick="handleMenuSelection('products')" class="w-full sm:w-1/2 bg-gradient-to-r from-sky-500 to-blue-600 hover:from-sky-400 hover:to-blue-500 text-white font-extrabold text-xs py-3.5 rounded-2xl transition-all duration-300 transform hover:-translate-y-1 active:translate-y-0 active:scale-95 flex items-center justify-center gap-2 shadow-lg shadow-sky-500/20">
                        <i class="fa-solid fa-cubes-stacked text-sm"></i> Lihat Produk
                    </button>
                    <button onclick="handleMenuSelection('owner')" class="w-full sm:w-1/2 bg-slate-800/80 hover:bg-emerald-600/20 border border-white/5 hover:border-emerald-500/50 text-emerald-400 font-extrabold text-xs py-3.5 rounded-2xl transition-all duration-300 transform hover:-translate-y-1 active:translate-y-0 active:scale-95 flex items-center justify-center gap-2 shadow-md hover:shadow-lg">
                        <i class="fa-solid fa-id-badge text-sm"></i> Hubungi Owner
                    </button>
                `;
                botMsg.content.appendChild(menuDiv);
                activeInteractiveElements.push(botMsg.container);
                scrollToBottom();
            }, 800);
        }

        // Action when choosing main menu items
        function handleMenuSelection(menuType) {
            clearPreviousMenus();

            if (menuType === 'products') {
                appendUserMessage("Lihat Produk 📦");

                showTypingIndicator(botMsg.content);

                setTimeout(() => {
                    removeTypingIndicator(botMsg.content);
                    botMsg.content.innerHTML = `
                        <div class="glass-card text-slate-100 rounded-[22px] rounded-tl-sm p-5 shadow-2xl border border-white/10">
                            <h4 class="font-extrabold text-sm text-sky-400 mb-2.5 flex items-center gap-2">
                                <i class="fa-solid fa-basket-shopping"></i> Kategori Produk Premium
                            </h4>
                            <p class="text-xs text-slate-300 leading-relaxed font-medium mb-1">
                                Pilih kategori layanan di bawah untuk menampilkan produk dan paket harga yang tersedia:
                            </p>
                        </div>
                    `;

                    const prodMenu = document.createElement('div');
                    prodMenu.className = 'flex flex-col gap-2 w-full mt-2';
                    prodMenu.innerHTML = `
                        <button onclick="showSubMenu('bot_wa')" class="w-full bg-[#1c2436] hover:bg-sky-500/10 border border-white/5 hover:border-sky-500/40 text-slate-100 text-xs font-bold py-3.5 px-4 rounded-2xl transition-all duration-300 transform hover:-translate-y-0.5 active:scale-98 flex items-center justify-between">
                            <span class="flex items-center gap-2.5"><i class="fa-brands fa-whatsapp text-emerald-400 text-base"></i> Sewa Bot WA</span>
                            <i class="fa-solid fa-chevron-right text-[10px] text-slate-400"></i>
                        </button>
                        <button onclick="showSubMenu('pterodactyl')" class="w-full bg-[#1c2436] hover:bg-sky-500/10 border border-white/5 hover:border-sky-500/40 text-slate-100 text-xs font-bold py-3.5 px-4 rounded-2xl transition-all duration-300 transform hover:-translate-y-0.5 active:scale-98 flex items-center justify-between">
                            <span class="flex items-center gap-2.5"><i class="fa-solid fa-server text-cyan-400 text-base"></i> Panel Pterodactyl Legal</span>
                            <i class="fa-solid fa-chevron-right text-[10px] text-slate-400"></i>
                        </button>
                        <button onclick="showSubMenu('file_pidz')" class="w-full bg-[#1c2436] hover:bg-sky-500/10 border border-white/5 hover:border-sky-500/40 text-slate-100 text-xs font-bold py-3.5 px-4 rounded-2xl transition-all duration-300 transform hover:-translate-y-0.5 active:scale-98 flex items-center justify-between">
                            <span class="flex items-center gap-2.5"><i class="fa-solid fa-folder-open text-amber-400 text-base"></i> All File Pidz</span>
                            <i class="fa-solid fa-chevron-right text-[10px] text-slate-400"></i>
                        </button>
                        <button onclick="sendStartCommand()" class="w-full bg-[#2a1b1b] hover:bg-red-500/10 border border-red-500/20 hover:border-red-500/50 text-red-400 text-xs font-bold py-3 rounded-2xl transition-all duration-300 text-center">
                            <i class="fa-solid fa-arrow-left mr-1"></i> Kembali ke Menu Utama
                        </button>
                    `;
                    botMsg.content.appendChild(prodMenu);
                    activeInteractiveElements.push(botMsg.container);
                    scrollToBottom();
                }, 600);

            } else if (menuType === 'owner') {
                appendUserMessage("Hubungi Owner 👤");
                const botMsg = createBotMessageContainer();
                showTypingIndicator(botMsg.content);

                setTimeout(() => {
                    removeTypingIndicator(botMsg.content);
                    botMsg.content.innerHTML = `
                        <div class="glass-card text-slate-100 rounded-[22px] rounded-tl-sm p-5 shadow-2xl border border-white/10 space-y-4">
                            <div class="flex items-center space-x-3.5">
                                <div class="w-14 h-14 rounded-2xl bg-emerald-500/10 border-2 border-emerald-500/30 flex items-center justify-center">
                                    <i class="fa-solid fa-user-shield text-2xl text-emerald-400"></i>
                                </div>
                                <div>
                                    <h5 class="font-extrabold text-sm text-slate-200">Owner Pidz Store</h5>
                                    <p class="text-xs text-emerald-400 font-semibold tracking-wide">+62 858-1614-8963</p>
                                </div>
                            </div>
                            <p class="text-xs text-slate-300 leading-relaxed font-medium">
                                Ada hal yang ingin ditanyakan langsung terkait kerja sama, kustomisasi bot, atau bantuan pembayaran? Kami siap merespon pesan WhatsApp Anda segera.
                            </p>
                            <a href="https://wa.me/6285816148963?text=Halo%20owner%20Pidz%20saya%20butuh%20bantuan%20terkait%20layanan" 
                               target="_blank" 
                               class="block w-full text-center bg-gradient-to-r from-emerald-500 to-green-600 hover:from-emerald-400 hover:to-green-500 text-white font-extrabold text-xs py-3.5 rounded-2xl transition-all duration-300 shadow-lg shadow-emerald-500/15">
                                <i class="fa-brands fa-whatsapp text-sm mr-1.5"></i> Hubungi via WhatsApp
                            </a>
                        </div>
                    `;

                    const backBtn = document.createElement('div');
                    backBtn.className = 'w-full mt-2';
                    backBtn.innerHTML = `
                        <button onclick="sendStartCommand()" class="w-full bg-[#1c2436] hover:bg-slate-700 text-slate-300 text-xs font-bold py-3 rounded-2xl border border-white/5 transition-all text-center">
                            <i class="fa-solid fa-arrow-left mr-1"></i> Kembali ke Menu Utama
                        </button>
                    `;
                    botMsg.content.appendChild(backBtn);
                    activeInteractiveElements.push(botMsg.container);
                    scrollToBottom();
                }, 600);
            }
        }

        // Submenus containing products list
        function showSubMenu(category) {
            clearPreviousMenus();

            const botMsg = createBotMessageContainer();
            showTypingIndicator(botMsg.content);

            setTimeout(() => {
                removeTypingIndicator(botMsg.content);

                let title = "";
                let description = "";
                let productsHTML = "";

                if (category === 'bot_wa') {
                    appendUserMessage("Lihat: Sewa Bot WA 🤖");
                    title = "🤖 Sewa Bot WhatsApp";
                    
                    // Styled description incorporating the premium benefits requested
                    description = `
                        Dapatkan akses bot asisten grup & personal terbaik dari Pidz dengan fitur super lengkap, cerdas, dan aktif 24 jam non-stop.
                        <div class="mt-3.5 p-4 bg-sky-500/10 rounded-2xl border border-sky-500/20 text-left space-y-2">
                            <p class="font-extrabold text-sky-400 text-xs flex items-center gap-1.5">
                                <i class="fa-solid fa-gem text-amber-400"></i> Keuntungan Premium
                            </p>
                            <div class="space-y-1 text-[11px] text-slate-300 font-medium">
                                <p class="flex items-center gap-2"><i class="fa-solid fa-circle-check text-emerald-400"></i> Limit harian lebih banyak (500/hari)</p>
                                <p class="flex items-center gap-2"><i class="fa-solid fa-circle-check text-emerald-400"></i> Akses fitur eksklusif premium</p>
                                <p class="flex items-center gap-2"><i class="fa-solid fa-circle-check text-emerald-400"></i> Priority support dari owner</p>
                                <p class="flex items-center gap-2"><i class="fa-solid fa-circle-check text-emerald-400"></i> Bebas dari limit & cooldown</p>
                            </div>
                            <p class="text-[10px] text-slate-400 pt-2 border-t border-white/5 flex items-center gap-1">

        // Active countdown timer loops

            if (!timerEl) return;

            const interval = setInterval(() => {
                secondsRemaining--;

                if (secondsRemaining <= 0) {
                    clearInterval(interval);
                    if (timerEl) timerEl.innerText = "EXPIRED";
                    
                    // Expire anim and removal (auto-close sequence)

                        cardElement.classList.add('fade-out-anim');

                            cardElement.remove();
                            // Render Expired message to guide customer

                                </button>
                            `;
                            expiredMsg.content.appendChild(backBtn);
                            scrollToBottom();
                        }, 450);
                    }
                    return;
                }

                const hrs = String(Math.floor(secondsRemaining / 3600)).padStart(2, '0');
                const mins = String(Math.floor((secondsRemaining % 3600) / 60)).padStart(2, '0');
                const secs = String(secondsRemaining % 60).padStart(2, '0');

                if (timerEl) {
                    timerEl.innerText = `${hrs}:${mins}:${secs}`;
                }
            }, 1000);
        }

        // Gemini AI API Processing & Custom Fallbacks
        async function askGeminiAI(userQuery) {
            appendUserMessage(userQuery);

            const botMsg = createBotMessageContainer();
            showTypingIndicator(botMsg.content);

            const systemPrompt = `
                Kamu adalah asisten virtual interaktif cerdas "Pidz Bot" (toko digital). 
                Kamu melayani pelanggan dengan ramah, komunikatif, dan responsif dalam Bahasa Indonesia.
                Tugasmu adalah membantu menjelaskan produk kami secara singkat & persuasif:
                1. Sewa Bot WA:
                   - 2 Hari: 1k
                   - 5 Hari: 3k
                   - 1 Minggu: 5k
                   - 2 Minggu: 8k
                2. Panel Pterodactyl Legal:
                   - ram 1Gb: 5.000, 2Gb: 8.000, 3Gb: 10.000, 4Gb: 13.000, 5Gb: 15.000, 6Gb: 17.000, 7Gb: 20.000, 8Gb: 22.000, 9Gb: 25.000, 10gb: 27.000
                3. All File Pidz:
                   - SPX TOOLS V2: 15K
                   - DRAG SHOOT: 10K

                Jika user tertarik untuk membeli, sarankan mereka untuk mengklik tombol menu interaktif atau sampaikan cara melakukan order cepat. Berikan respons yang rapi dengan list atau poin-poin yang asyik dibaca.
            `;

            let responseText = "";
            let success = false;
            let retries = 5;
            let delay = 1000;

            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: userQuery }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        responseText = data.candidates?.[0]?.content?.parts?.[0]?.text || "Maaf, terjadi kesalahan saat menyusun tanggapan.";
                        success = true;
                        break;
                    }
                } catch (err) {
                    // Fail silently
                }
                
                if (i < retries - 1) {
                    await new Promise(resolve => setTimeout(resolve, delay));
                    delay *= 2;
                }
            }

            removeTypingIndicator(botMsg.content);

            if (!success) {
                responseText = "Halo kak! Maaf sekali, koneksi AI kami sedang penuh. Kamu bisa memesan produk kami secara instan dengan menekan tombol menu interaktif di bawah ya! 👇";
            }

            clearPreviousMenus();

            botMsg.content.innerHTML = `
                <div class="glass-card text-slate-100 rounded-[22px] rounded-tl-sm p-5 shadow-2xl border border-white/10">
                    <div class="prose prose-invert text-xs leading-relaxed whitespace-pre-line text-slate-200">
                        ${responseText}
                    </div>
                </div>
            `;

            const actionDiv = document.createElement('div');
            actionDiv.className = 'grid grid-cols-2 gap-2.5 w-full mt-2';
            actionDiv.innerHTML = `

                    <i class="fa-solid fa-house"></i> Home Bot
                </button>
            `;
            botMsg.content.appendChild(actionDiv);
            activeInteractiveElements.push(botMsg.container);
